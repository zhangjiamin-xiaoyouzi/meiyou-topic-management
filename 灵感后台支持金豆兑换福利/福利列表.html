<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>福利详情</title>
	<style>
		:root {
			--bg: #f4f6fb;
			--panel: #ffffff;
			--sidebar: #3b4453;
			--sidebar-dark: #313947;
			--sidebar-text: #c8cfda;
			--sidebar-active: #2e3542;
			--sidebar-current: #242a35;
			--line: #e7eaf0;
			--text: #556072;
			--muted: #aeb7c5;
			--pink: #ff5d9e;
			--green: #41c76a;
			--danger: #ff6b77;
			--shadow: 0 8px 22px rgba(21, 31, 56, 0.08);
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			min-height: 100%;
			font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
			background: var(--bg);
			color: var(--text);
		}

		body {
			min-width: 1280px;
		}

		.app {
			display: flex;
			min-height: 100vh;
		}

		.sidebar {
			width: 160px;
			background: linear-gradient(180deg, var(--sidebar) 0%, var(--sidebar-dark) 100%);
			color: var(--sidebar-text);
			padding-top: 10px;
			box-shadow: 2px 0 12px rgba(0, 0, 0, 0.08);
		}

		.nav-group {
			border-bottom: 1px solid rgba(255, 255, 255, 0.04);
		}

		.nav-title,
		.nav-item {
			height: 41px;
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 0 14px;
			font-size: 13px;
			letter-spacing: 0.2px;
			position: relative;
		}

		.nav-title::after {
			content: "▾";
			position: absolute;
			right: 10px;
			font-size: 10px;
			opacity: 0.65;
		}

		.nav-icon {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			border: 1px solid rgba(255, 255, 255, 0.45);
			opacity: 0.8;
			flex: none;
		}

		.nav-group.active .nav-title {
			color: #eef2f8;
		}

		.nav-sub .nav-item {
			padding-left: 28px;
			color: #bac4d3;
			background: transparent;
		}

		.nav-item.current {
			background: var(--sidebar-current);
			color: #eef2f8;
			padding-left: 28px;
		}

		.main {
			flex: 1;
			display: flex;
			flex-direction: column;
			min-width: 0;
		}

		.topbar {
			height: 56px;
			background: #fff;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 18px 0 16px;
			box-shadow: 0 2px 14px rgba(31, 40, 55, 0.08);
			position: relative;
			z-index: 2;
		}

		.topbar-left {
			display: flex;
			align-items: center;
			gap: 14px;
		}

		.hamburger {
			width: 14px;
			display: grid;
			gap: 2px;
		}

		.hamburger span {
			height: 2px;
			background: #98a3b2;
			border-radius: 999px;
		}

		.crumb {
			font-size: 12px;
			color: #c0c7d3;
		}

		.crumb b {
			color: var(--pink);
			font-weight: 400;
		}

		.user-box {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.avatar {
			width: 28px;
			height: 28px;
			border-radius: 6px;
			background: linear-gradient(135deg, #ff8b52 0%, #ff4f8a 100%);
			display: grid;
			place-items: center;
			color: #ffe9a8;
			font-size: 10px;
			font-weight: 700;
			box-shadow: 0 4px 10px rgba(255, 88, 140, 0.35);
		}

		.caret {
			color: #909cad;
			font-size: 10px;
		}

		.page {
			padding: 10px 14px 26px;
		}

		.page-head {
			display: flex;
			align-items: center;
			gap: 10px;
			font-size: 12px;
			color: #b3bcc9;
			margin-bottom: 8px;
		}

		.page-head b {
			color: var(--pink);
			font-weight: 400;
		}

		.tag {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			height: 26px;
			padding: 0 10px;
			border: 1px solid #ff9fc4;
			background: var(--pink);
			color: #fff;
			font-size: 12px;
			border-radius: 2px;
			box-shadow: 0 4px 10px rgba(255, 93, 158, 0.18);
		}

		.tag::after {
			content: "×";
			font-size: 12px;
			opacity: 0.9;
		}

		.card {
			background: var(--panel);
			border: 1px solid #edf0f5;
			min-height: 680px;
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
			border-radius: 2px;
		}

		.form-wrap {
			padding: 22px 0 40px 54px;
			width: 100%;
		}

		.form-row {
			display: flex;
			align-items: flex-start;
			margin-bottom: 14px;
			font-size: 12px;
		}

		.label {
			width: 98px;
			padding-top: 8px;
			text-align: right;
			color: #5e6878;
			flex: none;
		}

		.label .req {
			color: #ff727d;
			margin-right: 4px;
		}

		.control {
			width: 322px;
			position: relative;
		}

		.input,
		.select,
		.upload-btn,
		.tiny-input {
			width: 100%;
			height: 31px;
			border: 1px solid #e3e7ee;
			border-radius: 3px;
			background: #fff;
			padding: 0 12px;
			font-size: 12px;
			color: #7b8798;
			outline: none;
		}

		.input::placeholder {
			color: #c0c8d4;
		}

		.select {
			appearance: none;
			background-image:
				linear-gradient(45deg, transparent 50%, #adb6c4 50%),
				linear-gradient(135deg, #adb6c4 50%, transparent 50%),
				linear-gradient(to right, transparent, transparent);
			background-position:
				calc(100% - 16px) 12px,
				calc(100% - 11px) 12px,
				100% 0;
			background-size: 5px 5px, 5px 5px, 2.5em 2.5em;
			background-repeat: no-repeat;
			padding-right: 28px;
		}

		.counter {
			position: absolute;
			right: 8px;
			top: 8px;
			color: #c4ccd7;
			font-size: 12px;
			pointer-events: none;
		}

		.upload-inline {
			display: inline-flex;
			align-items: center;
			gap: 8px;
		}

		.upload-btn {
			width: 64px;
			padding: 0;
			color: #707d8f;
			cursor: pointer;
			background: linear-gradient(180deg, #fff 0%, #fafbfd 100%);
		}

		.hidden-input {
			display: none;
		}

		.period-group,
		.radio-group {
			display: flex;
			align-items: center;
			flex-wrap: wrap;
			gap: 18px;
			min-height: 31px;
			padding-top: 5px;
			color: #707d8f;
		}

		.radio {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			cursor: pointer;
			user-select: none;
			white-space: nowrap;
		}

		.radio input {
			appearance: none;
			width: 13px;
			height: 13px;
			border: 1px solid #cfd6e2;
			border-radius: 50%;
			margin: 0;
			position: relative;
			background: #fff;
			flex: none;
		}

		.radio input:checked {
			border-color: #ff7bae;
		}

		.radio input:checked::after {
			content: "";
			position: absolute;
			inset: 2px;
			border-radius: 50%;
			background: var(--pink);
		}

		.radio.active-text {
			color: var(--pink);
		}

		.period-extra {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			margin-left: -6px;
		}

		.tiny-input {
			width: 58px;
			text-align: center;
			padding: 0 8px;
		}

		.editor {
			width: 292px;
			border: 1px solid #dde3ec;
			border-radius: 2px;
			overflow: hidden;
			background: #fff;
		}

		.toolbar {
			height: 28px;
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 0 8px;
			border-bottom: 1px solid #e5e9f0;
			background: linear-gradient(180deg, #fcfdfe 0%, #f6f8fb 100%);
			color: #5f6b7c;
			font-size: 12px;
		}

		.tool-sep {
			width: 1px;
			height: 12px;
			background: #dfe5ee;
		}

		.toolbar .tool-select {
			border: 1px solid transparent;
			padding-right: 10px;
			position: relative;
		}

		.toolbar .tool-select::after {
			content: "▾";
			position: absolute;
			right: -2px;
			top: -1px;
			font-size: 10px;
			color: #909bad;
		}

		.editor-body {
			min-height: 216px;
			padding: 10px 12px;
			outline: none;
			color: #5e6878;
			font-size: 12px;
			line-height: 1.6;
		}

		.editor-footer {
			height: 18px;
			display: flex;
			align-items: center;
			padding: 0 8px;
			border-top: 1px solid #eceff4;
			color: #b5bdc8;
			font-size: 11px;
		}

		.footer-actions {
			display: flex;
			gap: 10px;
			padding-left: 114px;
			margin-top: 20px;
		}

		.btn {
			min-width: 52px;
			height: 25px;
			border: 1px solid transparent;
			border-radius: 3px;
			color: #fff;
			font-size: 12px;
			cursor: pointer;
			padding: 0 14px;
		}

		.btn-save {
			background: var(--green);
			box-shadow: 0 6px 14px rgba(65, 199, 106, 0.2);
		}

		.btn-cancel {
			background: var(--danger);
			box-shadow: 0 6px 14px rgba(255, 107, 119, 0.2);
		}

		.btn .dot {
			font-size: 10px;
			margin-right: 4px;
		}

		.upload-name {
			color: #a5afbe;
			font-size: 12px;
		}

		.form-row.hidden {
			display: none;
		}

		.field-error {
			margin-top: 6px;
			font-size: 12px;
			line-height: 1.4;
			color: #ff6b77;
		}

		.label-with-tip {
			display: inline-flex;
			align-items: center;
			gap: 6px;
		}

		.help-tip {
			position: relative;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 14px;
			height: 14px;
			border: 1px solid #cfd6e2;
			border-radius: 50%;
			font-size: 10px;
			line-height: 1;
			color: #98a3b2;
			background: #fff;
			cursor: help;
		}

		.help-tip::before {
			content: "?";
		}

		.help-tip::after {
			content: attr(data-tip);
			position: absolute;
			left: calc(100% + 8px);
			top: 50%;
			transform: translateY(-50%);
			width: 250px;
			padding: 8px 10px;
			border-radius: 4px;
			background: rgba(51, 58, 72, 0.96);
			box-shadow: 0 8px 20px rgba(20, 28, 45, 0.18);
			color: #fff;
			font-size: 12px;
			line-height: 1.5;
			text-align: left;
			white-space: normal;
			opacity: 0;
			visibility: hidden;
			pointer-events: none;
			transition: opacity 0.18s ease;
			z-index: 5;
		}

		.help-tip:hover::after {
			opacity: 1;
			visibility: visible;
		}

		@media (max-width: 1366px) {
			.form-wrap {
				padding-left: 36px;
			}
		}
	</style>
</head>
<body>
	<div class="app">
		<aside class="sidebar">
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>订单管理</span></div></div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>用户管理</span></div></div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>提现管理</span></div></div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>策略管理</span></div></div>
			<div class="nav-group active">
				<div class="nav-title"><span class="nav-icon"></span><span>福利管理</span></div>
				<div class="nav-sub">
					<div class="nav-item">福利服务商</div>
					<div class="nav-item">福利资源</div>
					<div class="nav-item current">福利列表</div>
					<div class="nav-item">福利领取记录</div>
					<div class="nav-item">福利领取记录</div>
					<div class="nav-item">服务商外部订单</div>
				</div>
			</div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>权益管理</span></div></div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>权益商品</span></div></div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>美柚诊锁工具管理</span></div></div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>频道管理</span></div></div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>消息管理</span></div></div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>赚金币</span></div></div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>客户服务</span></div></div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>会员管理</span></div></div>
			<div class="nav-group"><div class="nav-title"><span class="nav-icon"></span><span>学生管理</span></div></div>
		</aside>

		<main class="main">
			<header class="topbar">
				<div class="topbar-left">
					<div class="hamburger" aria-hidden="true">
						<span></span>
						<span></span>
						<span></span>
					</div>
					<div class="crumb"><b>首页</b> / 福利详情</div>
				</div>
				<div class="user-box">
					<div class="avatar">MeU</div>
					<div class="caret">▼</div>
				</div>
			</header>

			<section class="page">
				<div class="page-head">
					<span class="tag">福利详情</span>
				</div>

				<div class="card">
					<div class="form-wrap">
						<div class="form-row">
							<div class="label"><span class="req">*</span>APP:</div>
							<div class="control">
								<select class="select" aria-label="APP">
									<option selected>美柚-返现</option>
									<option>美柚-会员</option>
									<option>柚宝宝</option>
								</select>
							</div>
						</div>

						<div class="form-row">
							<div class="label"><span class="req">*</span>所属业务:</div>
							<div class="control">
								<select class="select" id="business-select" aria-label="所属业务">
									<option selected>返现业务</option>
									<option>会员省钱业务</option>
									<option>平台金豆业务</option>
								</select>
							</div>
						</div>

						<div class="form-row">
							<div class="label"><span class="req">*</span>福利名称:</div>
							<div class="control">
								<input class="input countable" type="text" maxlength="20" placeholder="福利名称" value="">
								<span class="counter">0/20</span>
							</div>
						</div>

						<div class="form-row">
							<div class="label"><span class="req">*</span>福利来源:</div>
							<div class="control">
								<select class="select" aria-label="福利来源">
									<option selected>请选择福利来源</option>
									<option>站内供应商</option>
									<option>三方合作方</option>
								</select>
							</div>
						</div>

						<div class="form-row">
							<div class="label"><span class="req">*</span>福利价值(元):</div>
							<div class="control">
								<input class="input countable" id="benefit-price" type="text" maxlength="20" placeholder="请输入数字" value="">
								<span class="counter">0/20</span>
							</div>
						</div>

						<div class="form-row hidden" id="channel-price-row">
							<div class="label"><span class="label-with-tip"><span><span class="req">*</span>渠道专享价:</span><span class="help-tip" data-tip="填写数值用于换算兑换所需金豆价格，如填写1元，则需要10000金豆" aria-label="渠道专享价说明" tabindex="0"></span></span></div>
							<div class="control">
								<input class="input" id="channel-price" type="text" placeholder="请输入渠道专享价">
								<div class="field-error" id="channel-price-error" hidden></div>
							</div>
						</div>

						<div class="form-row">
							<div class="label"><span class="req">*</span>福利图片:</div>
							<div class="control upload-inline">
								<label class="upload-btn" for="cover-upload">上传图片</label>
								<span class="upload-name" id="cover-name"></span>
								<input class="hidden-input" id="cover-upload" type="file" accept="image/*">
							</div>
						</div>

						<div class="form-row">
							<div class="label"><span class="req">*</span>领取周期时间:</div>
							<div class="control" style="width: 760px;">
								<div class="period-group" id="period-group">
									<label class="radio active-text"><input type="radio" name="period" value="yearly" checked>每年</label>
									<label class="radio"><input type="radio" name="period" value="every">每季</label>
									<label class="radio"><input type="radio" name="period" value="month">每月</label>
									<label class="radio"><input type="radio" name="period" value="week">每周</label>
									<label class="radio"><input type="radio" name="period" value="recent">最近</label>
									<span class="period-extra">
										<input class="tiny-input" type="text" value="" aria-label="最近天数">
										<span>天</span>
									</span>
									<label class="radio"><input type="radio" name="period" value="forever">终生</label>
								</div>
							</div>
						</div>

						<div class="form-row">
							<div class="label"><span class="req">*</span>说明:</div>
							<div class="control" style="width: 290px;">
								<div class="editor">
									<div class="toolbar">
										<span>HTML</span>
										<span class="tool-sep"></span>
										<strong>B</strong>
										<i>I</i>
										<span class="tool-sep"></span>
										<span class="tool-select">字号</span>
										<span class="tool-sep"></span>
										<span>A</span>
										<span>•</span>
										<span>≡</span>
										<span>☰</span>
									</div>
									<div class="editor-body" id="editor" contenteditable="true"></div>
									<div class="editor-footer">元素路径:</div>
								</div>
							</div>
						</div>

						<div class="form-row">
							<div class="label">领取后,按钮1:</div>
							<div class="control">
								<div class="radio-group" id="after-btn1">
									<label class="radio active-text"><input type="radio" name="btn1" value="hide" checked>不展示</label>
									<label class="radio"><input type="radio" name="btn1" value="show">展示</label>
								</div>
							</div>
						</div>

						<div class="form-row">
							<div class="label">领取后,按钮2:</div>
							<div class="control">
								<div class="radio-group" id="after-btn2">
									<label class="radio active-text"><input type="radio" name="btn2" value="hide" checked>不展示</label>
									<label class="radio"><input type="radio" name="btn2" value="show">展示</label>
								</div>
							</div>
						</div>

						<div class="form-row">
							<div class="label">领取后,教程图片:</div>
							<div class="control upload-inline">
								<label class="upload-btn" for="guide-upload">上传图片</label>
								<span class="upload-name" id="guide-name"></span>
								<input class="hidden-input" id="guide-upload" type="file" accept="image/*">
							</div>
						</div>

						<div class="form-row">
							<div class="label">是否启用</div>
							<div class="control">
								<div class="radio-group" id="enabled-group">
									<label class="radio active-text"><input type="radio" name="enabled" value="on" checked>启用</label>
									<label class="radio"><input type="radio" name="enabled" value="off">禁用</label>
								</div>
							</div>
						</div>

						<div class="footer-actions">
							<button class="btn btn-save" id="save-button" type="button"><span class="dot">⊙</span>保存</button>
							<button class="btn btn-cancel" type="button"><span class="dot">⊙</span>取消</button>
						</div>
					</div>
				</div>
			</section>
		</main>
	</div>

	<script>
		function updateCounter(input) {
			var counter = input.parentElement.querySelector('.counter');
			if (!counter) return;
			counter.textContent = input.value.length + '/' + input.maxLength;
		}

		document.querySelectorAll('.countable').forEach(function (input) {
			updateCounter(input);
			input.addEventListener('input', function () {
				updateCounter(input);
			});
		});

		function bindUpload(inputId, labelId) {
			var input = document.getElementById(inputId);
			var label = document.getElementById(labelId);
			input.addEventListener('change', function () {
				label.textContent = input.files && input.files[0] ? input.files[0].name : '';
			});
		}

		bindUpload('cover-upload', 'cover-name');
		bindUpload('guide-upload', 'guide-name');

		function bindRadioText(containerId) {
			var container = document.getElementById(containerId);
			if (!container) return;
			var labels = container.querySelectorAll('.radio');
			function sync() {
				labels.forEach(function (label) {
					var input = label.querySelector('input');
					label.classList.toggle('active-text', input.checked);
				});
			}
			container.addEventListener('change', sync);
			sync();
		}

		bindRadioText('period-group');
		bindRadioText('after-btn1');
		bindRadioText('after-btn2');
		bindRadioText('enabled-group');

		var businessSelect = document.getElementById('business-select');
		var benefitPriceInput = document.getElementById('benefit-price');
		var channelPriceRow = document.getElementById('channel-price-row');
		var channelPriceInput = document.getElementById('channel-price');
		var channelPriceError = document.getElementById('channel-price-error');
		var saveButton = document.getElementById('save-button');

		function parseAmount(value) {
			if (!value) return NaN;
			var normalized = value.trim();
			if (!/^\d+(\.\d{1,2})?$/.test(normalized)) {
				return NaN;
			}
			return Number(normalized);
		}

		function showChannelPriceError(message) {
			channelPriceError.textContent = message;
			channelPriceError.hidden = false;
		}

		function hideChannelPriceError() {
			channelPriceError.hidden = true;
			channelPriceError.textContent = '';
		}

		function toggleChannelPriceField() {
			var showChannelPrice = businessSelect.value === '平台金豆业务';
			channelPriceRow.classList.toggle('hidden', !showChannelPrice);
			if (!showChannelPrice) {
				channelPriceInput.value = '';
				hideChannelPriceError();
			}
		}

		function validateChannelPrice() {
			if (businessSelect.value !== '平台金豆业务') {
				hideChannelPriceError();
				return true;
			}

			var benefitPrice = parseAmount(benefitPriceInput.value);
			if (Number.isNaN(benefitPrice) || benefitPrice < 0.01) {
				showChannelPriceError('请先输入有效的福利价值，金额需不小于0.01');
				return false;
			}

			var channelPrice = parseAmount(channelPriceInput.value);
			if (Number.isNaN(channelPrice)) {
				showChannelPriceError('渠道专享价必填，金额格式最多保留2位小数');
				return false;
			}

			if (channelPrice < 0.01 || channelPrice > benefitPrice) {
				showChannelPriceError('渠道专享价范围需在0.01到福利价值之间，且不能超过福利价值');
				return false;
			}

			hideChannelPriceError();
			return true;
		}

		businessSelect.addEventListener('change', toggleChannelPriceField);
		benefitPriceInput.addEventListener('input', function () {
			if (!channelPriceRow.classList.contains('hidden')) {
				validateChannelPrice();
			}
		});
		channelPriceInput.addEventListener('input', validateChannelPrice);
		saveButton.addEventListener('click', function () {
			if (!validateChannelPrice()) {
				channelPriceInput.focus();
				return;
			}
			window.alert('保存成功');
		});

		toggleChannelPriceField();
	</script>
</body>
</html>
