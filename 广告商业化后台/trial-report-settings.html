<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>试用报告设置</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px 0;
    }

    #app {
      background: white;
    }

    .trial-report-settings {
      padding: 30px;
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 30px;
      color: #333;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
    }

    .section {
      margin-bottom: 25px;
    }

    .label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
      font-size: 15px;
      color: #333;
    }

    .required {
      color: #ff4444;
      font-weight: bold;
      font-size: 18px;
    }

    .add-btn {
      background-color: #4a90e2;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      margin-left: auto;
    }

    .add-btn:hover {
      background-color: #357abd;
      box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
    }

    .add-btn:active {
      transform: scale(0.98);
    }

    .settings-row {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 6px;
      border-left: 4px solid #4a90e2;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }

    .input-group {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .input-readonly {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background-color: #f5f5f5;
      color: #999;
      flex: 0 0 auto;
      font-size: 14px;
      cursor: not-allowed;
    }

    .input-content {
      flex: 1;
      min-width: 200px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .input-content:focus {
      outline: none;
      border-color: #4a90e2;
      box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.1);
    }

    .input-field {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.3s;
    }

    .input-field:focus {
      outline: none;
      border-color: #4a90e2;
      box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.1);
    }

    .dropdown {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background-color: white;
      cursor: pointer;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .dropdown:focus {
      outline: none;
      border-color: #4a90e2;
      box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.1);
    }

    .unit {
      font-size: 14px;
      color: #666;
      flex: 0 0 auto;
      font-weight: 500;
    }

    .submit-btn {
      background-color: #4a90e2;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      align-self: flex-start;
    }

    .submit-btn:hover {
      background-color: #357abd;
      box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .questionnaires-container {
      background-color: #f9f9f9;
      padding: 25px;
      border-radius: 6px;
      margin-bottom: 30px;
      border: 1px solid #efefef;
    }

    .questionnaire-card {
      background-color: white;
      padding: 20px;
      border-radius: 6px;
      margin-bottom: 15px;
      border: 1px solid #e8e8e8;
      transition: all 0.3s ease;
    }

    .questionnaire-card:hover {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .questionnaire-card:last-child {
      margin-bottom: 0;
    }

    .questionnaire-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #f0f0f0;
    }

    .questionnaire-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .questionnaire-number {
      background: #4a90e2;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }

    .checkbox-group {
      flex-direction: row;
      align-items: center;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4a90e2;
    }

    .delete-btn {
      background-color: #4a90e2;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s ease;
      margin-top: 15px;
      width: 100%;
    }

    .delete-btn:hover {
      background-color: #e74c3c;
      box-shadow: 0 2px 8px rgba(231, 76, 60, 0.3);
    }

    .delete-btn:active {
      transform: scale(0.98);
    }

    .footer-buttons {
      display: flex;
      gap: 15px;
      justify-content: flex-start;
      padding-top: 20px;
      border-top: 1px solid #f0f0f0;
    }

    .save-btn {
      background-color: #4a90e2;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .save-btn:hover {
      background-color: #357abd;
      box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
    }

    .save-btn:active {
      transform: scale(0.98);
    }

    .cancel-btn {
      background-color: #999;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .cancel-btn:hover {
      background-color: #777;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .cancel-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 768px) {
      .trial-report-settings {
        padding: 20px;
      }

      h1 {
        font-size: 20px;
        margin-bottom: 20px;
      }

      .input-group {
        flex-direction: column;
      }

      .input-readonly,
      .input-content,
      .dropdown {
        width: 100%;
      }

      .label {
        flex-direction: column;
        align-items: flex-start;
      }

      .add-btn {
        margin-left: 0;
        width: 100%;
      }

      .footer-buttons {
        flex-direction: column;
      }

      .save-btn,
      .cancel-btn,
      .delete-btn {
        width: 100%;
      }
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      padding: 16px 20px;
      border-radius: 4px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      max-width: 300px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .notification.success {
      border-left: 4px solid #27ae60;
      color: #27ae60;
    }

    .notification.error {
      border-left: 4px solid #e74c3c;
      color: #e74c3c;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          showImageUpload: false,
          notification: null,
          questionnaires: [
            {
              title: '',
              required: false,
              sortValue: '',
              questionType: '',
              quantity: ''
            },
            {
              title: '',
              required: false,
              sortValue: '',
              questionType: '',
              quantity: ''
            }
          ]
        }
      },
      methods: {
        addQuestionnaire() {
          this.questionnaires.push({
            title: '',
            required: false,
            sortValue: '',
            questionType: '',
            quantity: ''
          })
          this.showNotification('新问卷已添加', 'success')
        },
        deleteQuestionnaire(index) {
          this.questionnaires.splice(index, 1)
          this.showNotification('问卷已删除', 'success')
        },
        saveSettings() {
          console.log('保存设置', this.questionnaires)
          this.showNotification('设置已保存成功', 'success')
        },
        cancelSettings() {
          console.log('取消设置')
          this.showNotification('已取消操作', 'error')
        },
        showNotification(message, type = 'success') {
          this.notification = { message, type };
          setTimeout(() => {
            this.notification = null;
          }, 3000);
        }
      },
      template: `
        <div class="trial-report-settings">
          <h1>试用报告设置</h1>
          
          <div class="section">
            <div class="label">
              <span class="required">*</span>
              <span>补交报告预设图片：</span>
              <button class="add-btn" @click="showImageUpload = true">添加图片</button>
            </div>
          </div>

          <div class="settings-row">
            <div class="form-group">
              <label>
                <span class="required">*</span> 报告截止时间
              </label>
              <div class="input-group">
                <input type="text" placeholder="回复类型" value="回复类型" readonly class="input-readonly">
                <select class="dropdown">
                  <option>包括类别</option>
                  <option>排除类别</option>
                </select>
                <input type="text" placeholder="请输入内容" class="input-content">
                <span class="unit">天</span>
              </div>
            </div>

            <div class="form-group">
              <label>
                <span class="required">*</span> 试用报告设置
              </label>
              <select class="dropdown">
                <option>问卷报告</option>
                <option>文本报告</option>
                <option>混合报告</option>
              </select>
            </div>

            <button class="submit-btn" @click="addQuestionnaire">添加问题</button>
          </div>

          <div class="questionnaires-container">
            <div v-if="questionnaires.length === 0" style="text-align: center; color: #999; padding: 40px 0;">
              <p>暂无问卷，点击上方"添加问题"按钮创建新问卷</p>
            </div>
            <div v-for="(q, index) in questionnaires" :key="index" class="questionnaire-card">
              <div class="questionnaire-header">
                <div class="questionnaire-title">问卷 {{ index + 1 }}</div>
                <div class="questionnaire-number">{{ index + 1 }}</div>
              </div>

              <div class="form-group">
                <label>标题</label>
                <input v-model="q.title" type="text" class="input-field" placeholder="请输入问卷标题">
              </div>

              <div class="form-group checkbox-group">
                <label>是否必填</label>
                <input v-model="q.required" type="checkbox" class="checkbox">
              </div>

              <div class="form-group">
                <label>排序值</label>
                <input v-model="q.sortValue" type="text" class="input-field" placeholder="请输入排序值（数字）">
              </div>

              <div class="form-group">
                <label>题目类型</label>
                <select v-model="q.questionType" class="dropdown">
                  <option value="">请选择题目类型</option>
                  <option value="text">文本输入</option>
                  <option value="choice">单选题</option>
                  <option value="multiple">多选题</option>
                  <option value="textarea">长文本</option>
                  <option value="image">上传图片</option>
                </select>
              </div>

              <div v-if="q.questionType === 'image'" class="form-group">
                <label>
                  <span class="required">*</span> 数量
                </label>
                <select v-model="q.quantity" class="dropdown">
                  <option value="">请选择数量</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="8">8</option>
                  <option value="9">9</option>
                  <option value="10">10</option>
                </select>
              </div>

              <button class="delete-btn" @click="deleteQuestionnaire(index)">删除本问题</button>
            </div>
          </div>

          <div class="footer-buttons">
            <button class="save-btn" @click="saveSettings">保存</button>
            <button class="cancel-btn" @click="cancelSettings">取消</button>
          </div>

          <div v-if="notification" :class="['notification', notification.type]">
            {{ notification.message }}
          </div>
        </div>
      `
    }).mount('#app');
  </script>
</body>
</html>
