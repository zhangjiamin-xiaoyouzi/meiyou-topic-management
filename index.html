<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美柚社区话题管理系统 - 预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #ff4d88;
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .subtitle {
            color: #999;
            font-size: 14px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: #ff4d88;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            margin: 10px 10px;
        }
        .btn:hover {
            background: #ff3366;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,77,136,.3);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
            box-shadow: 0 8px 20px rgba(0,0,0,.1);
        }
        .feature-list {
            text-align: left;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        .feature-item {
            display: flex;
            align-items: center;
            margin: 12px 0;
            color: #666;
            font-size: 13px;
        }
        .feature-item:before {
            content: "✓";
            display: inline-block;
            width: 24px;
            height: 24px;
            background: #ff4d88;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 12px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 话题管理系统</h1>
        <p class="subtitle">
            美柚社区话题管理后台原型<br>
            支持话题筛选、批量操作、标签管理
        </p>
        
        <a href="./topic-management.html" class="btn">进入话题管理</a>
        
        <div class="feature-list">
            <div class="feature-item">按发帖数阈值快速筛选话题</div>
            <div class="feature-item">批量选择和批量修改标签</div>
            <div class="feature-item">批量下线话题操作</div>
            <div class="feature-item">话题标签4维度分类</div>
            <div class="feature-item">需求说明注释系统</div>
        </div>
    </div>
</body>
</html>
